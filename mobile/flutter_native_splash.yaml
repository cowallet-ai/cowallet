# flutter_native_splash Configuration

# Background color
color: "#FFFFFF"

# Background image (optional)
# image: assets/splash/background.png

# Branding image (logo)
image: assets/icon/app_icon.png

# Image width as percentage of screen width
width: 120

# Image gravity (center, top, bottom, fill)
# gravity: center

# Fullscreen (true) or centered (false)
fullscreen: true

# Android specific
android:
  # Color of the status bar
  android_12:
    # Splash screen exit animation
    image: assets/icon/app_icon.png
    color: "#FFFFFF"

  # Hide/Show status bar
  hide_status_bar: false

  # Hide/Show navigation bar
  hide_navigation_bar: false

# iOS specific
ios:
  # Color of the status bar
  ios_12:
    image: assets/icon/app_icon.png
    color: "#FFFFFF"

  # Hide/Show status bar
  hide_status_bar: false

# Web specific
web:
  # Image source (network or asset)
  # image: assets/icon/app_icon.png

  # Color
  color: "#FFFFFF"

  # Web image loading
  web_image_mode: center