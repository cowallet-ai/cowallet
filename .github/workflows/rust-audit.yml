# Rust Lint(advisory).
#
# RustSec 漏洞审计已迁移到 cargo-deny.yml(deny 的 advisories 检查是 cargo audit
# 的超集,一处统管漏洞/license/bans/sources,避免重复扫描)。
# 本 workflow 只保留 clippy 静态分析,advisory(continue-on-error),因历史 lint
# debt(184 warn + 2 err);债清后移除 continue-on-error 升为 required。
# 仅在 Rust 源码变更时触发。
name: Rust Lint

on:
  push:
    branches: [main]
    paths: ["backend/**", "crates/**", "Cargo.toml", "Cargo.lock"]
  pull_request:
    paths: ["backend/**", "crates/**", "Cargo.toml", "Cargo.lock"]
  schedule:
    # 每周一 08:13 UTC — 捡刚发布的新 CVE。
    - cron: "13 8 * * 1"

jobs:
  clippy:
    name: cargo clippy (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # 与 ci.yml 的 test job 共享编译缓存(key 必须一致):clippy 与 test 的
          # codegen 大量重叠,共享后两个 job 合计省掉近一整遍 workspace 编译。
          shared-key: "workspace"

      # Advisory: 不因历史 lint debt 阻塞 PR;结果可见于 Actions 日志。
      # 待 lint debt 清完后移除 continue-on-error 并升级为 required。
      - name: Run clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets -- -D warnings
