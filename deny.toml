# cargo-deny 配置 —— 供应链门禁:漏洞 / license 合规 / 依赖来源。
# 本地:cargo install cargo-deny && cargo deny check
# CI:  .github/workflows/cargo-deny.yml
#
# 采用 v2 配置格式(cargo-deny 0.14+),移除了已废弃字段。

[graph]
# 只审真正会编译进制品的依赖;all-features 避免漏掉 feature-gated 的依赖。
all-features = true

[advisories]
version = 2
# RustSec 漏洞库。有漏洞/被 yank 的依赖直接卡门禁(取代 rust-audit.yml 里的
# cargo audit,统一到 deny 一处)。
yanked = "deny"
# 已知且已评估的 advisory 在此逐条登记豁免(带 RUSTSEC 编号 + 理由)。
# 不允许空泛忽略;每条都须有可达性/风险评估依据(见 issue #7)。
ignore = [
    # RUSTSEC-2023-0071 —— rsa crate Marvin Attack 时序侧信道(私钥操作)。
    # 评估:生产不可达。api-server 的 rsa 仅用于公钥验签(verify_device_signature,
    # routes/auth.rs:660),唯一的 RsaPrivateKey 在 #[cfg(test)] 门控的 rsa_tests 内,
    # 不进生产二进制。Marvin 针对私钥解密/签名时序,生产侧零私钥操作 → 不可达。
    # 上游暂无修复版。待 rsa 发布修复后移除此豁免。
    { id = "RUSTSEC-2023-0071", reason = "生产不可达:仅公钥验签,私钥操作仅测试代码" },

    # ── rustls-webpki 证书校验漏洞 ──────────────────────────────────────────
    # 两个易受影响版本均锁在传递依赖里,无法就地升级,须靠上游大版本跟进:
    #   0.101.7 ← rustls 0.21 ← AWS SDK(aws-config/aws-sdk-sesv2 等)
    #   0.102.8 ← async-nats 0.38(升 0.50 为 breaking,需 NATS 回归)
    # 均由独立升级任务跟踪(见 issue #7);升级落地后逐条移除。
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 传递依赖锁定,待 AWS SDK/async-nats 升级,见 #7" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 传递依赖锁定,待 AWS SDK/async-nats 升级,见 #7" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 传递依赖锁定,待 AWS SDK/async-nats 升级,见 #7" },
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 传递依赖锁定,待 async-nats 升级,见 #7" },

    # ── unmaintained(上游明确无安全升级版,低风险)──────────────────────────
    # 均为传递依赖,官方标注 "No safe upgrade available";属维护状态而非可利用漏洞。
    { id = "RUSTSEC-2025-0141", reason = "bincode 未维护,传递依赖,无安全升级版,见 #7" },
    { id = "RUSTSEC-2024-0436", reason = "paste 未维护,传递依赖,无安全升级版,见 #7" },
    { id = "RUSTSEC-2026-0173", reason = "proc-macro-error2 未维护,传递依赖,无安全升级版,见 #7" },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 未维护,传递依赖,无安全升级版,见 #7" },
]

[licenses]
version = 2
# 置信阈值:低于此值的 license 文本匹配视为未识别。0.8 是官方推荐值。
confidence-threshold = 0.8
# 白名单 —— 依据本仓库实际依赖树扫描得出(全部为宽松许可)。
# 新增依赖若引入不在此列的 license,门禁会红,须显式评估后再加。
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CC0-1.0",
    "Unlicense",
    "MIT-0",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

# AGPL-3.0 例外:synedrion / manul 是 MPC 门限签名核心依赖(Entropy 出品),
# 无宽松许可替代品。此处精确放行这两个 crate 的 AGPL,其余 AGPL 仍一律拒绝。
# ⚠️ 合规影响:AGPL 有强 copyleft 网络条款,法务需知悉此依赖。
exceptions = [
    { crate = "synedrion", allow = ["AGPL-3.0-or-later"] },
    { crate = "manul", allow = ["AGPL-3.0-or-later"] },
]

# 注:本仓库 workspace crate 通过各自 Cargo.toml 的 license.workspace = true
# 继承根 [workspace.package] 的 MIT,均为正常 license,无需 private 豁免。

# allo-isolate(移动端 FFI 传递依赖)发布时漏填 SPDX license 字段,crates.io
# 标记为 non-standard;上游仓库 README/LICENSE 实为 Apache-2.0,在此声明。
[[licenses.clarify]]
crate = "allo-isolate"
expression = "Apache-2.0"
license-files = []

[bans]
# 依赖树现有 74 个 crate 存在多版本共存(多为 ark-*/crypto 生态传递版本偏移),
# 设 deny 会当场卡死且非本仓库可控 → 设 warn 做可见性提示,不阻塞。
# 债务收敛后可升 deny。
multiple-versions = "warn"
# 通配符版本("*")依赖:生产依赖不该用,设 warn 提示(dev-dep 常见)。
wildcards = "warn"
# 显式拉黑名单(如已知有问题的 crate)—— 目前为空,按需登记。
deny = []

[sources]
# 依赖来源门禁:未知 registry / 未知 git 源一律拒绝,防供应链投毒。
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
